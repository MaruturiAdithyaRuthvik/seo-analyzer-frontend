<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEOAnalyzer Pro - Data Science Assignment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;600;800&family=Outfit:wght@300;400;600;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            overflow: hidden;
            /* Prevent native scroll before analysis starts */
        }

        h1,
        h2,
        h3,
        .logo-text {
            font-family: 'Jost', sans-serif;
        }

        /* Vanta Background Layer */
        #vanta-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* Hero Text Animation */
        .hero-title {
            font-size: clamp(4rem, 12vw, 10rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ffffff 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textReveal 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes textReveal {
            0% {
                opacity: 0;
                transform: translateY(50px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bounceGlow {

            0%,
            100% {
                transform: translateY(0);
                filter: drop-shadow(0 0 10px rgba(168, 85, 247, 0.5));
            }

            50% {
                transform: translateY(10px);
                filter: drop-shadow(0 0 20px rgba(168, 85, 247, 0.8));
            }
        }

        .scroll-indicator {
            animation: bounceGlow 2s infinite;
            cursor: pointer;
        }

        /* Glassmorphism Panel */
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        /* Premium Hover Effects */
        .metric-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .metric-card:hover {
            transform: scale(1.05) translateY(-5px);
            z-index: 50;
        }

        .metric-card.status-pass:hover {
            box-shadow: 0 10px 25px -5px rgba(52, 211, 153, 0.4);
            border-color: rgba(52, 211, 153, 0.5);
        }

        .metric-card.status-fail:hover {
            box-shadow: 0 10px 25px -5px rgba(244, 63, 94, 0.4);
            border-color: rgba(244, 63, 94, 0.5);
        }

        /* Shine effect */
        .metric-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right,
                    rgba(255, 255, 255, 0) 0%,
                    rgba(255, 255, 255, 0.1) 50%,
                    rgba(255, 255, 255, 0) 100%);
            transform: skewX(-25deg);
            z-index: 10;
        }

        .metric-card:hover::before {
            animation: cardShine 0.8s ease-in-out;
        }

        @keyframes cardShine {
            0% {
                left: -100%;
            }

            100% {
                left: 200%;
            }
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0f172a;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #a855f7;
        }
    </style>
</head>

<body class="relative text-slate-100 flex flex-col min-h-screen">

    <!-- Background Layer (Vanta.js) -->
    <div id="vanta-bg"></div>

    <!-- STAGE 1: FULL SCREEN HERO -->
    <div id="hero-container"
        class="absolute inset-0 z-10 flex flex-col items-center justify-center transition-all duration-700 ease-in-out h-screen w-full">
        <h1 class="hero-title">SEOAnalyzer</h1>
        <p class="text-xl md:text-3xl text-slate-300 font-light tracking-wide mt-4 opacity-0"
            style="animation: textReveal 1.5s 0.3s forwards;">
            Uncover Your Site's Hidden Potential
        </p>
        <div class="scroll-indicator absolute bottom-12 text-fuchsia-400 opacity-0 flex flex-col items-center"
            style="animation: bounceGlow 2s infinite, textReveal 1.5s 0.8s forwards;">
            <span class="text-sm uppercase tracking-widest font-semibold mb-2">Scroll Down</span>
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3">
                </path>
            </svg>
        </div>
    </div>

    <!-- STAGE 2: DASHBOARD SECTION (Initially translates down 100vh) -->
    <div id="dashboard-container"
        class="absolute inset-x-0 top-0 z-20 flex flex-col items-center transition-all duration-700 ease-in-out translate-y-[100vh] opacity-0 pointer-events-none min-h-screen pt-12 pb-20 px-4">

        <header class="w-full max-w-7xl flex flex-col items-center mb-10">
            <h2 class="text-4xl md:text-5xl font-extrabold tracking-tight drop-shadow-md text-center">
                Deep Dive <span
                    class="text-transparent bg-clip-text bg-gradient-to-r from-fuchsia-400 to-indigo-400">Analysis</span>
            </h2>
        </header>

        <!-- INPUT VIEW -->
        <section id="input-view"
            class="w-full max-w-3xl glass-panel rounded-3xl p-6 md:p-10 shadow-2xl relative overflow-hidden transition-all duration-500">
            <div class="absolute inset-0 bg-gradient-to-br from-white/5 to-transparent pointer-events-none"></div>

            <form id="analysis-form" class="relative z-10 flex flex-col gap-6" onsubmit="startAnalysis(event)">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="flex flex-col gap-2">
                        <label for="url"
                            class="text-sm font-semibold text-slate-300 uppercase tracking-widest ml-1">Target
                            URL</label>
                        <input type="url" id="url" required placeholder="https://example.com"
                            class="w-full px-4 py-4 bg-slate-900/50 border border-slate-700/50 rounded-xl focus:ring-2 focus:ring-fuchsia-500 focus:border-transparent text-white placeholder-slate-500 transition-all shadow-inner outline-none">
                    </div>

                    <div class="flex flex-col gap-2">
                        <label for="keyword"
                            class="text-sm font-semibold text-slate-300 uppercase tracking-widest ml-1">Focus
                            Keyword</label>
                        <input type="text" id="keyword" required placeholder="e.g. data science"
                            class="w-full px-4 py-4 bg-slate-900/50 border border-slate-700/50 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-white placeholder-slate-500 transition-all shadow-inner outline-none">
                    </div>
                </div>

                <button type="submit" id="submit-btn"
                    class="mt-4 w-full py-4 rounded-xl font-bold text-lg bg-gradient-to-r from-fuchsia-600 to-indigo-600 hover:from-fuchsia-500 hover:to-indigo-500 text-white shadow-[0_0_20px_rgba(168,85,247,0.4)] hover:shadow-[0_0_30px_rgba(168,85,247,0.6)] transition-all transform hover:-translate-y-1 flex items-center justify-center gap-3">
                    <span id="btn-text">Run Analysis</span>
                    <svg id="btn-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                    </svg>
                    <svg id="btn-spinner" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white hidden"
                        xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                        </circle>
                        <path class="opacity-75" fill="currentColor"
                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                        </path>
                    </svg>
                </button>
                <div id="error-message" class="hidden text-rose-400 text-center font-semibold mt-2"></div>
            </form>
        </section>

        <!-- REPORT VIEW -->
        <section id="report-view"
            class="w-full max-w-7xl hidden flex-col transition-all duration-500 mt-6 relative z-30">
            <!-- Navigation Back -->
            <button id="back-btn"
                class="self-start mb-6 flex items-center gap-2 text-slate-400 hover:text-white transition-colors bg-white/5 px-4 py-2 rounded-lg hover:bg-white/10 border border-transparent hover:border-white/10">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Analyze New URL
            </button>

            <!-- Score Panel -->
            <div class="glass-panel rounded-3xl p-8 mb-8 flex flex-col md:flex-row items-center justify-between gap-8">
                <div class="flex-1 text-center md:text-left">
                    <h2 class="text-3xl font-bold mb-2 text-white">Analysis Complete</h2>
                    <p class="text-slate-400 text-sm mb-4">Target Keyword: <span id="result-keyword"
                            class="text-fuchsia-400 font-semibold px-2 py-1 bg-fuchsia-400/10 rounded"></span></p>
                    <div
                        class="inline-flex items-center gap-2 text-indigo-400 font-medium bg-indigo-500/10 px-4 py-2 rounded-xl transition-colors border border-indigo-500/20">
                        <span id="result-url" class="truncate max-w-[250px] md:max-w-md"></span>
                    </div>
                </div>
                <div class="w-32 h-32 relative flex items-center justify-center">
                    <svg class="absolute inset-0 w-full h-full -rotate-90" viewBox="0 0 36 36">
                        <path class="text-slate-800" d="M18 2 a 16 16 0 1 1 0 32 a 16 16 0 1 1 0 -32" fill="none"
                            stroke="currentColor" stroke-width="3" />
                        <path id="score-ring"
                            class="text-emerald-400 transition-all duration-1500 drop-shadow-[0_0_10px_currentColor]"
                            stroke-dasharray="0, 100" d="M18 2 a 16 16 0 1 1 0 32 a 16 16 0 1 1 0 -32" fill="none"
                            stroke="currentColor" stroke-width="3" stroke-linecap="round" />
                    </svg>
                    <div class="flex flex-col items-center">
                        <span class="text-4xl font-extrabold text-white tracking-tighter"><span
                                id="score-text">0</span><span class="text-xl text-slate-400">%</span></span>
                    </div>
                </div>
            </div>

            <!-- CSS GRID: 7 Metrics -->
            <div id="metrics-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
                <!-- Javascript will inject metric cards here -->
            </div>

            <!-- AI Suggestions -->
            <div id="ai-magic-holder"></div>

            <!-- Download Button -->
            <div class="flex justify-center mt-12 w-full mb-20">
                <button onclick="downloadPDF()" id="pdf-btn"
                    class="px-8 py-4 rounded-xl font-bold text-lg bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white shadow-[0_0_20px_rgba(168,85,247,0.4)] hover:shadow-[0_0_30px_rgba(168,85,247,0.6)] transition-all transform hover:-translate-y-1 flex items-center justify-center gap-3">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                    </svg>
                    Download Executive Report
                </button>
            </div>
        </section>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script>
        // Start Vanta
        let vantaEffect;
        document.addEventListener('DOMContentLoaded', () => {
            if (window.VANTA && window.VANTA.NET) {
                vantaEffect = VANTA.NET({
                    el: "#vanta-bg",
                    color: 0xa855f7,
                    backgroundColor: 0x0f172a,
                    points: 15.00,
                    maxDistance: 20.00,
                    spacing: 15.00
                });
            }
        });

        // STAGE 1 -> STAGE 2 SNAP LOGIC
        const hero = document.getElementById('hero-container');
        const dash = document.getElementById('dashboard-container');
        const scrollBtn = document.querySelector('.scroll-indicator');

        function snapToDashboard() {
            hero.style.transform = 'translateY(-100vh)';
            hero.style.opacity = '0';
            hero.style.pointerEvents = 'none';

            dash.classList.remove('translate-y-[100vh]', 'opacity-0', 'pointer-events-none');
            dash.classList.add('translate-y-0', 'opacity-100');
        }

        function handleWheel(e) {
            if (e.deltaY > 50) {
                snapToDashboard();
            }
        }
        window.addEventListener('wheel', handleWheel);
        scrollBtn.addEventListener('click', snapToDashboard);


        // START ANALYSIS (CRITICAL SCROLL FIX)
        async function startAnalysis(e) {
            e.preventDefault();

            // THE SCROLL BUG FIX (CRITICAL)
            // Remove the snap listener and enable normal vertical scrolling immediately.
            window.removeEventListener('wheel', handleWheel);
            document.body.style.overflow = 'auto';

            // Freeze Vanta animation in the background
            if (vantaEffect) {
                vantaEffect.setOptions({ points: 0.0, maxDistance: 0.0, spacing: 0.0 });
            }

            const url = document.getElementById('url').value;
            const keyword = document.getElementById('keyword').value;

            // UI Loading logic
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnIcon = document.getElementById('btn-icon');
            const btnSpinner = document.getElementById('btn-spinner');
            const errorMsg = document.getElementById('error-message');

            submitBtn.disabled = true;
            submitBtn.style.opacity = '0.5';
            btnText.textContent = "Analyzing...";
            btnIcon.classList.add('hidden');
            btnSpinner.classList.remove('hidden');
            errorMsg.classList.add('hidden');

            try {
                // THE FETCH LOGIC
                const response = await fetch('https://seo-analyzer-backend-dsok.onrender.com/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url, target_keyword: keyword })
                });

                if (!response.ok) throw new Error("Server error - Failed to fetch results.");
                const data = await response.json();

                // State Change: Hide Input, Show Report View
                document.getElementById('input-view').classList.add('hidden');
                document.getElementById('report-view').classList.remove('hidden');
                document.getElementById('report-view').style.display = 'flex';

                // Clear and render layout
                renderResults(data, url, keyword);

                // Ensure view is scrolled smoothly to the top of the Results Dashboard
                window.scrollTo({ top: 0, behavior: 'smooth' });

            } catch (err) {
                errorMsg.textContent = err.message || "Failed to connect. Make sure your Render backend is Live.";
                errorMsg.classList.remove('hidden');

                // Unfreeze Vanta on error so it looks alive
                if (vantaEffect) vantaEffect.setOptions({ points: 15.0 });
            } finally {
                submitBtn.disabled = false;
                submitBtn.style.opacity = '1';
                btnText.textContent = "Run Analysis";
                btnIcon.classList.remove('hidden');
                btnSpinner.classList.add('hidden');
            }
        }

        // RESET UI BUTTON
        document.getElementById('back-btn').addEventListener('click', () => {
            document.getElementById('report-view').classList.add('hidden');
            document.getElementById('input-view').classList.remove('hidden');

            // Restore Vanta animation
            if (vantaEffect) vantaEffect.setOptions({ points: 15.0 });

            // Re-apply scrolling config if desired, or leave normally auto
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });


        // THE RESULTS GRID GENERATOR
        function renderResults(data, url, keyword) {
            document.getElementById('result-url').textContent = url;
            document.getElementById('result-keyword').textContent = keyword;

            const mc = document.getElementById('metrics-container');
            mc.innerHTML = '';
            let passedCount = 0; const totalCount = 7;

            // Metric card builder function
            const createCard = (title, pass, current, target, spanClass) => {
                if (pass) passedCount++;
                const sColor = pass ? 'text-emerald-400' : 'text-rose-400';
                const sBg = pass ? 'bg-emerald-500/10' : 'bg-rose-500/10';
                const sBorder = pass ? 'border-emerald-500/20' : 'border-rose-500/20';
                const badge = pass ? 'Passed' : 'Needs Work';
                const hoverState = pass ? 'status-pass' : 'status-fail'; // Controls glowing drop-shadow

                // Build exactly matching internal html structure
                return `
                    <div class="glass-panel rounded-2xl p-6 flex flex-col metric-card ${hoverState} ${spanClass} border border-white/10">
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="font-bold text-lg text-white">${title}</h3>
                            <span class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wide border ${sBg} ${sColor} ${sBorder}">${badge}</span>
                        </div>
                        <div class="flex-grow flex flex-col justify-center mb-6">
                            <p class="text-sm text-slate-400 mb-1">Current:</p>
                            <p class="text-lg font-medium text-white">${current}</p>
                        </div>
                        <div class="pt-4 border-t border-white/10">
                            <span class="text-xs text-slate-500 uppercase font-semibold">Target</span>
                            <span class="block text-sm text-slate-300 mt-1">${target}</span>
                        </div>
                    </div>
                `;
            };

            // EXACT 7 METRICS
            mc.innerHTML += createCard('Title Tag', data.title?.pass || false, data.title?.present ? `${data.title.length} chars` : 'Missing', '50 - 60 chars', 'lg:col-span-2');
            mc.innerHTML += createCard('Meta Description', data.meta_description?.pass || false, data.meta_description?.present ? `${data.meta_description.length} chars` : 'Missing', '150 - 160 chars', 'lg:col-span-2');
            mc.innerHTML += createCard('Heading (H1)', data.h1?.pass || false, `${data.h1?.count || 0} detected`, 'Exactly 1 tag', 'lg:col-span-1');
            mc.innerHTML += createCard('Word Count', data.word_count?.pass || false, `${data.word_count?.count || 0} words`, '300+ words', 'lg:col-span-1');
            mc.innerHTML += createCard('Keyword Density', data.keyword_density?.pass || false, `${data.keyword_density?.density_percentage || 0}%`, '1.0% - 3.0%', 'lg:col-span-1');
            mc.innerHTML += createCard('Link Analysis', data.links?.pass || false, `${data.links?.internal || 0} internal, ${data.links?.external || 0} external`, '> 0 links', 'lg:col-span-1');
            mc.innerHTML += createCard('Image Analysis', data.images?.pass || false, `${data.images?.total || 0} total, ${data.images?.missing_alt || 0} missing alt`, '0 missing alt', 'lg:col-span-1');

            // Set Score Text & Ring
            const sp = Math.round((passedCount / totalCount) * 100);
            const ring = document.getElementById('score-ring');
            ring.style.strokeDasharray = `${sp}, 100`;
            ring.classList.remove('text-emerald-400', 'text-amber-400', 'text-rose-500');

            if (sp >= 80) ring.classList.add('text-emerald-400');
            else if (sp >= 40) ring.classList.add('text-amber-400');
            else ring.classList.add('text-rose-500');

            document.getElementById('score-text').textContent = sp;

            // AI Recommendations Build
            const aiHolder = document.getElementById('ai-magic-holder');
            aiHolder.innerHTML = '';

            if (data.ai_recommendations && data.ai_recommendations.length > 0) {
                const aiHTML = `
                    <div id="ai-magic-box" class="p-8 mt-4 rounded-3xl shadow-[0_10px_40px_-10px_rgba(107,33,168,0.5)] bg-gradient-to-br from-indigo-900 to-purple-900 border border-purple-500/50">
                        <h3 class="text-white text-2xl font-bold mb-6 flex items-center gap-3"><span class="text-3xl">✨</span> AI Magic Suggestions</h3>
                        <ul class="flex flex-col gap-4">
                            ${data.ai_recommendations.map(rec => `
                                <li class="text-indigo-50 bg-purple-500/15 border border-purple-500/30 rounded-xl p-4 flex items-start gap-4 text-base leading-relaxed">
                                    <span class="text-purple-400 font-extrabold shrink-0">→</span> ${rec}
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                `;
                aiHolder.innerHTML = aiHTML;
            }
        }

        // PDF GENERATION LOGIC
        async function downloadPDF() {
            const btn = document.getElementById('pdf-btn');
            const ogText = btn.innerHTML;
            btn.innerHTML = `<svg class="animate-spin w-5 h-5 text-white mr-2" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" class="opacity-25"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Generating...`;
            btn.disabled = true;

            try {
                const reportView = document.getElementById('report-view');
                const siteUrl = document.getElementById('result-url').textContent.trim();

                // Create strict dark-theme pdf container
                const pdfContainer = document.createElement('div');
                pdfContainer.style.width = '1200px';
                pdfContainer.style.backgroundColor = '#0f172a';
                pdfContainer.style.color = '#ffffff';
                pdfContainer.style.padding = '50px';
                pdfContainer.style.position = 'absolute';
                pdfContainer.style.left = '-9999px';
                pdfContainer.style.top = '0';

                // Executive Header
                pdfContainer.innerHTML = `
                    <div style="border-bottom: 2px solid rgba(168,85,247,0.4); padding-bottom: 20px; margin-bottom: 40px; display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <h1 style="font-size: 36px; font-weight: 800; margin: 0; color: #fff; font-family: Jost, sans-serif;">SEO Analysis Executive Report</h1>
                            <p style="color: #94a3b8; margin: 8px 0 0 0; font-size: 14px;">Analyzed URL: <span style="color: #a855f7;">${siteUrl}</span></p>
                        </div>
                        <div style="color: #64748b; font-size: 16px;">${new Date().toLocaleString()}</div>
                    </div>
                `;

                // Sub HTML container
                const subContent = document.createElement('div');
                subContent.innerHTML = reportView.innerHTML;

                // Strip buttons from cloning
                const buttons = subContent.querySelectorAll('button');
                buttons.forEach(b => b.remove());

                // Unconstrain CSS grids manually so jsPDF prints the full text
                const cards = subContent.querySelectorAll('.metric-card');
                cards.forEach(c => { c.style.height = 'auto'; }); // dynamic height fix

                pdfContainer.appendChild(subContent);
                document.body.appendChild(pdfContainer);

                // Run snapshot
                const canvas = await html2canvas(pdfContainer, { scale: 2, backgroundColor: '#0f172a', windowWidth: 1200 });
                document.body.removeChild(pdfContainer);

                // Package and download
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                const w = pdf.internal.pageSize.getWidth();
                const h = pdf.internal.pageSize.getHeight();
                const ih = (canvas.height * w) / canvas.width;
                const img = canvas.toDataURL('image/jpeg', 0.95);

                let hl = ih; let pos = 0;
                pdf.addImage(img, 'JPEG', 0, pos, w, ih);
                hl -= h;
                while (hl > 0) {
                    pos = hl - ih;
                    pdf.addPage();
                    pdf.addImage(img, 'JPEG', 0, pos, w, ih);
                    hl -= h;
                }

                pdf.save(`SEO_Report_${siteUrl.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.pdf`);
            } catch (err) {
                console.error("PDF Generate Error", err);
                alert("Failed to export PDF.");
            } finally {
                btn.innerHTML = ogText;
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>
